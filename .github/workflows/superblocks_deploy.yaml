name: Deploy

on:
  workflow_run:
    workflows: ["Sync changes to Superblocks"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    name: Deploy
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Deploy
        env:
          SUPERBLOCKS_TOKEN: ${{ secrets.SUPERBLOCKS_TOKEN }}
        run: |
          npm i -g @superblocksteam/cli@beta
          superblocks --version
          superblocks --help
          superblocks config set domain staging.superblocks.com
          superblocks login -t "$SUPERBLOCKS_TOKEN"
          superblocks deploy
