# .github/workflows/deploy.yaml
#
# Deploys Superblocks apps (Superblocks-as-Code) whenever changes land on main.
# Requires a repo secret SUPERBLOCKS_TOKEN (Settings > Secrets and variables > Actions).
# Get the key from https://app.superblocks.com/settings/apikeys (a service/deploy key, not a personal one).

name: Deploy to Superblocks

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: superblocks-deploy-${{ github.ref }}
  cancel-in-progress: false # don't cancel an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Superblocks CLI
        run: npm install -g @superblocksteam/cli

      - name: Authenticate
        env:
          SUPERBLOCKS_TOKEN: ${{ secrets.SUPERBLOCKS_TOKEN }}
        run: |
          if [ -z "$SUPERBLOCKS_TOKEN" ]; then
            echo "::error::SUPERBLOCKS_TOKEN secret is empty or not set. Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi
          superblocks login -t "$SUPERBLOCKS_TOKEN"

      # If you self-host or use the EU region, uncomment and set your domain:
      # - name: Set region
      #   run: superblocks config set domain eu.superblocks.com

      # Push the committed state to Superblocks, then deploy it.
      # Drop the push step if your pipeline only deploys already-pushed commits.
      - name: Push
        run: superblocks push

      - name: Deploy
        run: superblocks deploy
